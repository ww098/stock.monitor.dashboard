name: Auto Update TWSE Market Data

on:
  schedule:
    # 每個工作日 (週一至週五) 台北時間下午 3:30 (UTC 7:30) 執行
    - cron: '30 7 * * 1-5'
  workflow_dispatch: # 允許在 GitHub 網站上手動按鈕觸發
  
permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Crawler Script
        run: |
          python3 scripts/update_market_data.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market_data.json
          git diff-index --quiet HEAD || git commit -m "Auto-update market data (TWSE)"
          git push
